version: "3"
services:
  app:
    container_name: findyspace
    restart: always
    env_file: .env
    stdin_open: true
    tty: true
    environment:
      - NODE_ENV=$NODE_ENV
    build: .
    volumes:
      - .:/usr/src/app/
      - /usr/src/app/node_modules
    links:
      - db
    ports:
      - '3090:3090'
    networks:
      - findyspace
  db:
    container_name: db
    image: postgres:latest
    ports:
    - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    env_file:
      - docker.env
    networks:
      - findyspace
 
  pgadmin:
    links:
      - db
    container_name: pgadmin
    image: dpage/pgadmin4
    ports:
      - "8080:80"
    volumes:
      - /data/pgadmin:/root/.pgadmin
    env_file:
      - docker.env
    networks:
      - findyspace
 
networks:
  findyspace:
    driver: bridge
