<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>For testing purposes</title>
</head>
<body>
  <header>
    <h1>Findy</h1>
  </header>

  <section id="chatroom">
    <section id="feedback"></section>
  </section>



  <section id="input_zone"> 
    <input id="inp" class="vertical-align" type="text" />
    <button onclick="sendMsg()" id="send_message" class="vertical-align" type="button">Send</button>
  </section>
  <ul id="messages"></ul>
<script src="http://code.jquery.com/jquery-latest.min.js"></script>
  <script src="https://cdn.socket.io/3.1.3/socket.io.min.js" integrity="sha384-cPwlPLvBTa3sKAgddT6krw0cJat7egBga3DJepJyrLl4Q9/5WLra3rrnMcyTyOnh" crossorigin="anonymous"></script>
  <script>
    function handleJoinUser(name) {
          $('#messages').append(`
              <li>User joined: ${name}</li>
          `);
       }
    function getName() {
           return prompt('Please enter your name.');
       }
    let socket, name = '';
    $(document).ready(function() {
      socket = io();
      socket.on('connect', () => {
        name = getName();
        socket.emit('join', name);
      })

      socket.on('join', handleJoinUser)
    });

    function sendMsg() {
   const text = $('#inp').val();
   socket.emit('chat', { name, text });
}
  </script>
</body>
</html>
